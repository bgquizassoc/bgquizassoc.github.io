<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Старт на Светкавичен куиз</title>
<style>
  body { background:#001a33; color:white; text-align:center; padding:40px; font-family:Arial; }
  button {
    padding:15px 30px; font-size:1.4em; border:none; border-radius:10px;
    background:#ffd100; color:#111; font-weight:bold; cursor:pointer;
  }
  input {
    padding:10px; font-size:1.2em; border-radius:8px; border:none;
    margin-bottom:20px; width:200px; text-align:center;
  }
</style>
</head>
<body>

<h1>🎬 Старт на Светкавичен куиз</h1>

<p>Въведи име на епизод:</p>
<input id="ep" placeholder="пример: test29">

<br><br>
<button id="startBtn">СТАРТ 1</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let questions = [];

async function loadQuestions() {
  const res = await fetch("lightning/questions.json");
  questions = await res.json();
}

async function setState(ep, index, phase, durationMs) {
  await setDoc(
    doc(db, "games", "lightning", "state", "current"),
    {
      episodeId: ep,
      index,
      phase,
      startTime: Date.now(),
      duration: durationMs
    },
    { merge: false }
  );
}

async function resetState() {
  try {
    await deleteDoc(doc(db, "games", "lightning", "state", "current"));
  } catch(e) {}
}

async function runGame(ep) {
  await loadQuestions();
  const total = questions.length;

  const FIRST_Q = 20000;
  const Q = 20000;
  const EXPL = 40000;
  const RANK = 15000;

  let t = 0;

  // ПРЕДСТАРТ – 30 секунди
  setTimeout(() => setState(ep, 0, "prestart", 30000), t);
  t += 30000;

  for (let i = 0; i < total; i++) {
    const qDur = (i === 0) ? FIRST_Q : Q;

    setTimeout(() => setState(ep, i, "question", qDur), t);
    t += qDur;

    setTimeout(() => setState(ep, i, "explanation", EXPL), t);
    t += EXPL;

    setTimeout(() => setState(ep, i, "ranking", RANK), t);
    t += RANK;
  }
}

document.getElementById("startBtn").onclick = async () => {
  const ep = document.getElementById("ep").value.trim();
  if (!ep) return alert("Въведи име на епизод!");

  // 1) Автоматичен RESET
  await resetState();

  // 2) Лоби – стои вечно
  await setState(ep, 0, "lobby", 999999999);

  // 3) Стартираме автоматичната игра
  runGame(ep);

  alert("Играта стартира!");
};
</script>

</body>
</html>
