<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Старт на Светкавичен куиз</title>
<style>
  body { background:#001a33; color:white; text-align:center; padding:40px; font-family:Arial; }
  button {
    padding:15px 30px; font-size:1.4em; border:none; border-radius:10px;
    background:#ffd100; color:#111; font-weight:bold; cursor:pointer;
  }
</style>
</head>
<body>

<h1>🎬 Старт на Светкавичен куиз</h1>
<button id="startBtn">СТАРТ 2</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore, doc, setDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Зареждаме въпросите
let questions = [];

async function loadQuestions() {
  const res = await fetch("lightning/questions.json");
  questions = await res.json();
}

// Пишем състояние в Firestore
async function setState(index, phase, durationMs) {
  await setDoc(doc(db, "games", "lightning", "state", "current"), {
    index,
    phase,
    startTime: Date.now(),
    duration: durationMs
  });
}

// Главният автоматичен двигател
async function runGame() {
  await loadQuestions();
  const total = questions.length;

  // Времетраене
  const FIRST_Q = 40000; // 60 сек
  const Q = 20000;       // 20 сек
  const EXPL = 30000;    // 30 сек
  const RANK = 10000;    // 10 сек

  let t = 0;

  for (let i = 0; i < total; i++) {

    // Въпрос
    const qDur = (i === 0) ? FIRST_Q : Q;
    setTimeout(() => setState(i, "question", qDur), t);
    t += qDur;

    // Обяснение
    setTimeout(() => setState(i, "explanation", EXPL), t);
    t += EXPL;

    // Класиране
    setTimeout(() => setState(i, "ranking", RANK), t);
    t += RANK;
  }

  // Финално класиране (оставяме последното)
}

document.getElementById("startBtn").onclick = async () => {

  // Първо вкарваме всички в чакалня
  await setState(0, "waiting", 0);

  // Стартираме автоматичния цикъл
  runGame();

  alert("Играта стартира и ще върви автоматично!");
};
</script>

</body>
</html>
