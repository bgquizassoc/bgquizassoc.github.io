<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>История на играта</title>
<style>
  body {
    background: #0a1a3a;
    color: white;
    font-family: Arial, sans-serif;
    padding: 20px;
    line-height: 1.6;
  }
  h1 {
    color: #7fffd4;
    margin-bottom: 20px;
  }
  .question-block {
    margin-bottom: 35px;
    padding-bottom: 15px;
    border-bottom: 1px solid #2e4a7f;
  }
  .correct {
    color: #00ff88;
    font-weight: bold;
  }
  .wrong {
    color: #ff5555;
    font-weight: bold;
  }
  .label {
    color: #7fffd4;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>📘 История на играта</h1>
<div id="content">Зареждане...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, collection, getDocs
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const url = new URL(window.location.href);
const episodeId = url.searchParams.get("episodeId");
const player = url.searchParams.get("player");

const content = document.getElementById("content");

if (!episodeId || !player) {
  content.textContent = "Липсва информация за епизод или играч.";
  throw new Error("Missing params");
}

async function loadHistory() {
  // Проверка дали играчът е участвал
  const playerRef = doc(db, "games", "configurator", "episodes", episodeId, "results", player);
  const playerSnap = await getDoc(playerRef);

  if (!playerSnap.exists()) {
    content.textContent = "Нямате история за този епизод.";
    return;
  }

  // Зареждаме въпросите
  const episodeRef = doc(db, "games", "configurator", "episodes", episodeId);
  const episodeSnap = await getDoc(episodeRef);

  if (!episodeSnap.exists()) {
    content.textContent = "Епизодът не е намерен.";
    return;
  }

  const episodeData = episodeSnap.data();
  const questions = episodeData.questions || [];

  // Зареждаме отговорите на играча
  const answersSnap = await getDocs(
    collection(db, "games", "configurator", "episodes", episodeId, "results", player, "answers")
  );

  const answers = {};
  answersSnap.forEach(d => answers[d.id] = d.data());

  // Генерираме HTML
  let html = "";

  questions.forEach((q, i) => {
    const ans = answers[String(i)];
    const yourAnswer = ans?.answer || "—";
    const correct = q.correct || "";
    const explanation = q.explanation || "";

    const isCorrect = yourAnswer.trim() === correct.trim();

    html += `
      <div class="question-block">
        <div class="label">${i+1}. ${q.question}</div>

        <div><span class="label">Твоят отговор:</span> ${yourAnswer}</div>
        <div><span class="label">Верен отговор:</span> ${correct}</div>

        <div class="${isCorrect ? "correct" : "wrong"}">
          ${isCorrect ? "✔ Вярно" : "✘ Грешно"}
        </div>

        <div style="margin-top:10px;">${explanation}</div>
      </div>
    `;
  });

  content.innerHTML = html;
}

loadHistory();
</script>

</body>
</html>
