<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>История на играта – Фотомания Live</title>
  <style>
    body {
      background: #0a1a3a;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 900px;
      margin: auto;
      line-height: 1.6;
    }
    h1 {
      color: #7fffd4;
      text-align: center;
      margin-bottom: 5px;
      text-shadow: 0 0 5px #00e5ff44;
    }
    #playerTitle {
      text-align: center;
      color: #ffd100;
      font-size: 1.2em;
      margin-bottom: 25px;
    }
    .question-block {
      margin-bottom: 30px;
      padding: 15px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border-left: 6px solid #ffd100;
    }
    .question-block.correct-block  { border-left-color: #00e676; }
    .question-block.wrong-block    { border-left-color: #ff5252; }
    .question-block.skipped-block  { border-left-color: #888; opacity: 0.7; }

    /* ⭐ Снимката в историята */
    .question-img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 10px;
      margin-bottom: 10px;
      background: #001a33;
      display: block;
    }

    .label { color: #7fffd4; font-weight: bold; }
    .correct { color: #00e676; font-weight: bold; }
    .wrong   { color: #ff5252; font-weight: bold; }
    .skipped { color: #aaa; font-style: italic; }

    .big-letter {
      display: inline-block;
      font-size: 2em;
      font-weight: bold;
      width: 50px;
      height: 50px;
      line-height: 50px;
      text-align: center;
      border-radius: 10px;
      margin: 6px 4px;
      background: rgba(255,255,255,0.1);
    }
    .big-letter.correct-letter { background: #2e7d32; color: #00e676; }
    .big-letter.wrong-letter   { background: #7f2020; color: #ff5252; }

    .explanation { margin-top: 10px; opacity: 0.85; }

    .backBtn {
      display: block; margin: 30px auto;
      padding: 12px 30px; background: #ffd100;
      color: #003344; border: none; border-radius: 8px;
      font-size: 1.2em; cursor: pointer; font-weight: bold;
      text-align: center; width: 200px;
    }
    .backBtn:hover { background: #ffcc33; }

    #summary {
      text-align: center; margin-bottom: 25px;
      font-size: 1.1em; color: #aaddff;
    }
  </style>
</head>
<body>

<h1>📷 История на играта – Фотомания</h1>
<div id="playerTitle"></div>
<div id="summary">Зареждане...</div>
<div id="content"></div>
<button class="backBtn" onclick="window.history.back()">Назад</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore, collection, getDocs
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const params    = new URLSearchParams(window.location.search);
const episodeId = params.get("episodeId");
const player    = params.get("player");

const playerTitle = document.getElementById("playerTitle");
const summary     = document.getElementById("summary");
const content     = document.getElementById("content");

if (!episodeId || !player) {
  summary.textContent = "Липсва информация за епизод или играч.";
  throw new Error("Missing params");
}

playerTitle.textContent = "Играч: " + player;

async function loadHistory() {
  let questions = [];
  try {
    const res = await fetch("questions.json");
    questions = await res.json();
  } catch(e) {
    summary.textContent = "Не мога да заредя въпросите.";
    return;
  }

  let answers = {};
  try {
    const answersSnap = await getDocs(
      collection(db, "games", "fotomania", "episodes", episodeId, "results", player, "answers")
    );
    answersSnap.forEach(d => answers[d.id] = d.data());
  } catch(e) {
    summary.textContent = "Нямате история за този епизод.";
    return;
  }

  if (Object.keys(answers).length === 0) {
    summary.textContent = "Нямате записани отговори за този епизод.";
    return;
  }

  let correct = 0, wrong = 0, skipped = 0;
  questions.forEach((q, i) => {
    const ans = answers[String(i)];
    if (!ans) { skipped++; return; }
    if (ans.isCorrect) correct++;
    else wrong++;
  });

  summary.innerHTML = `
    Верни: <span style="color:#00e676;font-weight:bold;">${correct}</span> &nbsp;|&nbsp;
    Грешни: <span style="color:#ff5252;font-weight:bold;">${wrong}</span> &nbsp;|&nbsp;
    Пропуснати: <span style="color:#aaa;">${skipped}</span>
    &nbsp; от общо ${questions.length} въпроса
  `;

  let html = "";
  questions.forEach((q, i) => {
    const ans        = answers[String(i)];
    const mainLetter = (q.letter || "").toUpperCase();
    const altLetters = (q.alt_letters || []).map(l => l.toUpperCase());
    const allCorrect = [mainLetter, ...altLetters];
    const explanation= q.explanation || "";
    const imageUrl   = q.image || "";

    let statusClass = "skipped-block";
    let statusText  = '<span class="skipped">⬜ Не е отговорено</span>';
    let letterHtml  = "";

    if (ans) {
      const typed     = (ans.answer || "").toUpperCase();
      const isCorrect = ans.isCorrect;
      statusClass = isCorrect ? "correct-block" : "wrong-block";
      statusText  = isCorrect
        ? '<span class="correct">✔ Вярно</span>'
        : '<span class="wrong">✘ Грешно</span>';
      letterHtml = `
        <div style="margin: 8px 0;">
          <span class="label">Написа:</span>
          <span class="big-letter ${isCorrect ? "correct-letter" : "wrong-letter"}">${typed}</span>
          &nbsp;
          <span class="label">Верно:</span>
          ${allCorrect.map(l => `<span class="big-letter correct-letter">${l}</span>`).join("")}
        </div>
      `;
    } else {
      letterHtml = `
        <div style="margin: 8px 0;">
          <span class="label">Верен отговор:</span>
          ${allCorrect.map(l => `<span class="big-letter correct-letter">${l}</span>`).join("")}
        </div>
      `;
    }

    const imgHtml = imageUrl
      ? `<img class="question-img" src="${imageUrl}" alt="Снимка" />`
      : "";

    html += `
      <div class="question-block ${statusClass}">
        ${imgHtml}
        <div class="label">${i + 1}. ${q.question}</div>
        ${letterHtml}
        <div style="margin-top:4px;">${statusText}</div>
        ${explanation ? `<div class="explanation">${explanation}</div>` : ""}
      </div>
    `;
  });

  content.innerHTML = html;
}

loadHistory();
</script>

</body>
</html>
