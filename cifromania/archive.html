<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Архив класирания</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #00264d;
    padding: 20px;
    color: white;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
    color: white;
  }

  ul {
    list-style: none;
    padding: 0;
    max-width: 400px;
    margin: 0 auto;
  }

  li {
    background: white;
    color: #0033aa;
    padding: 12px 18px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccd7ff;
    transition: 0.2s;
  }

  li:hover {
    background: #e8eeff;
    transform: translateX(4px);
  }

  a {
    font-size: 20px;
    color: #0033aa;
    text-decoration: none;
    display: block;
  }
</style>
</head>
<body>

<h1>Архив на класиранията</h1>

<ul id="days"></ul>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs
  } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB6dQ5mJ-wF1LSvheCMHRuOqWk",
    authDomain: "cifromania-ac182.firebaseapp.com",
    projectId: "cifromania-ac182",
    storageBucket: "cifromania-ac182.appspot.com",
    messagingSenderId: "160282855589",
    appId: "1:160282855589:web:b36744f0eb572b6571129"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadArchive() {
    const daysList = document.getElementById("days");
    const snap = await getDocs(collection(db, "archive"));

    // Събираме всички дати в масив
    let dates = [];
    snap.forEach(doc => dates.push(doc.id));

    // Обръщаме реда → най-новите най-отгоре
    dates.sort().reverse();

    // Генерираме HTML
    let html = dates
      .map(date => `<li><a href="archive_day.html?date=${date}">${date}</a></li>`)
      .join("");

    daysList.innerHTML = html || "<p>Няма архивирани дни.</p>";
  }

  loadArchive();
</script>

</body>
</html>
