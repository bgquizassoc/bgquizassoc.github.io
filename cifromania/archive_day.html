<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Архив за деня</title>
<style>
 body {
    font-family: Arial, sans-serif;
    background: #0b3d91; /* твоят син фон */
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #ffffff;
}

#days, #list {
    max-width: 500px;
    margin: 0 auto;
    padding: 0;
}

a.day-link {
    display: block;
    background: white;
    color: #0b3d91;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    border: 2px solid #ffffff33;
}

a.day-link:hover {
    background: #dff5ff;
}

li {
    background: white;
    color: #0b3d91;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    list-style: none;
    border: 2px solid #ffffff33;
    font-weight: bold;
}

</style>
</head>
<body>


<h1 id="title">Архив</h1>
<ol id="players"></ol>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB6dQ5mJ-wF1LSvheCMHRuOqWk",
    authDomain: "cifromania-ac182.firebaseapp.com",
    projectId: "cifromania-ac182",
    storageBucket: "cifromania-ac182.appspot.com",
    messagingSenderId: "160282855589",
    appId: "1:160282855589:web:b36744f0eb572b6571129"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const date = params.get("date");

  document.getElementById("title").innerText = "Архив за " + date;

  async function loadPlayers() {
    const list = document.getElementById("players");

    // 🔥 ВЗИМАМЕ ПОДРЕДЕНИТЕ ПО ТОЧКИ ИГРАЧИ
    const q = query(
      collection(db, "archive", date, "players"),
      orderBy("score", "desc")
    );

    const snap = await getDocs(q);

    let pos = 1;
    let html = "";

    snap.forEach(doc => {
      const data = doc.data();
      html += `<li>${pos}. ${data.name} — ${data.score} т.</li>`;
      pos++;
    });

    list.innerHTML = html || "<p>Няма данни за този ден.</p>";
  }

  loadPlayers();
</script>
