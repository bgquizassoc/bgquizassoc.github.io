<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Куиз Коктейл – Архив</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #00264d;
    padding: 20px;
    color: white;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
    color: white;
  }

  ul {
    list-style: none;
    padding: 0;
    max-width: 400px;
    margin: 0 auto;
  }

  li {
    background: white;
    color: #0033aa;
    padding: 12px 18px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccd7ff;
    transition: 0.2s;
  }

  li:hover {
    background: #e8eeff;
    transform: translateX(4px);
  }

  a {
    font-size: 20px;
    color: #0033aa;
    text-decoration: none;
    display: block;
  }
</style>

</head>
<body>

<h1>Куиз Коктейл – Архив</h1>
<ul id="days"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore, doc, listCollections
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadArchiveDays() {
  const list = document.getElementById("days");

  // ВАЖНО: listCollections чете подколекциите (датите)
  const root = doc(db, "games", "kokteil", "archive");
  const cols = await listCollections(root);

  let days = cols
    .map(c => c.id)
    .filter(id => /^\d{4}-\d{2}-\d{2}$/.test(id))
    .sort((a, b) => b.localeCompare(a));

  list.innerHTML = days.length
    ? days.map(day => `<li><a href="cocktail_archive_day.html?date=${day}">${day}</a></li>`).join("")
    : "<p>Все още няма архивирани дни.</p>";
}

loadArchiveDays();
</script>

</body>
</html>
