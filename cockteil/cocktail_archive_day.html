<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Куиз Коктейл – Архив за деня</title>
<style>
 body {
    font-family: Arial, sans-serif;
    background: #00264d;
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #ffffff;
}

ol {
    max-width: 400px;
    margin: 0 auto;
    padding: 0;
}

li {
    background: white;
    color: #0b3d91;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
    border: 2px solid #ffffff33;
    font-weight: bold;
    list-style-position: inside;
}

/* зелено име */
.highlight-player {
    color: #00ff7f !important;
    background: rgba(0,255,128,0.15);
    border-color: #00ff7f;
    text-shadow: 0 0 8px #00ff7f;
}
</style>

</head>
<body>

<h1 id="title">Архив</h1>
<ol id="players"></ol>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, query, orderBy
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const date = params.get("date");

document.getElementById("title").innerText = "Архив за " + date;

async function loadPlayers() {
  const list = document.getElementById("players");

  const q = query(
    collection(db, "games", "kokteil", "archive", date, "players"),
    orderBy("points", "desc")
  );

  const snap = await getDocs(q);

  let rows = [];
  snap.forEach(doc => rows.push(doc.data()));

  list.innerHTML = rows.length
    ? rows.map(d => `
        <li data-id="${d.playerId}">
          ${d.playerName} — ${d.points} точки (${d.correctAnswers} верни отговора)
        </li>
      `).join("")
    : "<p>Няма данни за този ден.</p>";

  const currentId = localStorage.getItem("lastPlayedId");
  if (currentId) {
    const li = list.querySelector(`li[data-id="${currentId}"]`);
    if (li) {
      li.classList.add("highlight-player");
      li.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  }
}

loadPlayers();
</script>

</body>
</html>
