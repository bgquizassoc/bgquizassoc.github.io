  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow-x: hidden; overflow-y: auto; }

    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;

      background: #00264d;

    }

    h1 {
      text-align: center; color: #ffd100;

    #question { font-size: 1.6em; margin: 20px 0; font-weight: 600; }

    #next-btn {
      margin-top: 25px; padding: 12px 18px; font-size: 1.1em;

    #next-btn:hover { background:#ffcc33; transform:scale(1.05); }

    button.start, button.continue-btn, #archive-btn {

    }
    button.start:hover, button.continue-btn:hover, #archive-btn:hover {
      background:#ffcc33; transform:scale(1.05);
    }

    .btn-row {
      display: flex;
      justify-content: center;

      flex-wrap: wrap;
      margin-top: 10px;
    }

    #current-score {
      margin: 15px 0; font-size: 1.3em;
      color: #ffd100; font-weight: bold; display: none;

    #explanation {
      display:none; background:rgba(255,255,255,0.08);
      padding:20px; margin-top:20px;
      border-radius:12px; max-width:600px; text-align:center;
    }

    #explanation .button-row {
      display:flex; justify-content:center; gap:12px; margin-top:20px;
    }

    .yellow-btn {
      background:#ffd100; color:#111;
      padding:14px 22px; font-size:1.1em;
      border-radius:10px; border:none; font-weight:bold; cursor:pointer;
    }
    .yellow-btn:hover { background:#ffcc33; transform:scale(1.05); }

    #ranking {
      margin-top: 25px;
      text-align: left;
      font-size: 1em;
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 10px;
    }

    #ranking h2 {
      margin-bottom: 10px;
      color: #ffd100;
      font-size: 1.2em;
    }

    #ranking ol {
      margin: 0;
      padding-left: 20px;
    }

    #ranking li {
      margin-bottom: 6px;
      padding-bottom: 6px;
      border-bottom: 1px solid #444;
    }

    #ranking li:last-child {
      border-bottom: none;
    }

    #already-played-msg {
      margin-top: 15px;
      color: #ffb3b3;
      font-weight: bold;
    }

    /* зелено име вътре в класацията */
    .highlight-player {
      color: #7CFC00 !important;
      font-weight: bold;
      text-shadow: 0 0 8px #00ff7f;
      background: rgba(0,255,128,0.08);
      border-radius: 6px;
      padding: 4px 6px;
    }

</head>

<body>
<audio id="bg-music" src="VeronicaSave.mp3" loop preload="auto"></audio>
<h1>Игри на Знания<br>🍹 Куиз Коктейл 1🍹</h1>

<div id="start-screen">
  <p>Въведете Вашето ID:</p>

  <input type="text" id="player-id" placeholder="ID ..." /><br>

  <div class="btn-row">
    <button class="start" id="start-btn">Започни!</button>

    <button class="continue-btn" id="continue-btn" style="display:none;">
      Продължи от мястото, където спряхте
    </button>

    <button id="archive-btn" onclick="location.href='cocktail_archive.html'">
      Архив класиране
    </button>
  </div>

  <div id="last-result" style="margin-top:15px;"></div>
  <div id="already-played-msg"></div>

  <div id="ranking"></div>
</div>

<div id="quiz" style="display:none;">
  <div id="timer">
    <span class="label">Оставащо време:</span>
    <span id="seconds">20 сек.</span>
  </div>
  <div id="question"></div>
  <div id="answers" class="answers"></div>
  <div id="status"></div>
  <button id="next-btn" disabled>Следващ въпрос</button>
  <div id="current-score"></div>
</div>

<div id="explanation">
  <div id="explanation-text" style="font-size:1.2em; margin-bottom:20px;"></div>

  <div class="button-row">
    <button id="next-question-btn" class="yellow-btn">Следващ въпрос</button>
    <button id="close-explanation-btn" class="yellow-btn">Затвори</button>
  </div>
</div>

<script src="players.js"></script>
<script>
console.log("ТЕСТ: players.js се зарежда ли?");
console.log("PLAYERS:", typeof PLAYERS);
</script>
<script>
(async function(){

  // ===== НАСТРОЙКИ НА ИГРАТА =====

  const AREA_DISTRIBUTION = {
    "География": 4,
    "История": 4,
    "Философия": 1,
    "Митология": 1,
    "Религия": 1,
    "Изкуство": 3,
    "Кулинария": 3,
    "Кино": 4,
    "Литература": 3,
    "Музика": 3,
    "Наука": 3,
    "Архитектура": 1,
    "Астрономия": 3,
    "Биология": 3,
    "Физика": 3,
    "Химия": 3,
    "Спорт": 4,
    "Футбол": 3
  };

  const TOTAL_QUESTIONS = 50;

  // ===== DOM ЕЛЕМЕНТИ =====

  const startScreen = document.getElementById('start-screen');
  const playerIdInput = document.getElementById('player-id');
  const startBtn = document.getElementById('start-btn');
  const continueBtn = document.getElementById('continue-btn');
  const lastResultDiv = document.getElementById('last-result');
  const alreadyPlayedMsg = document.getElementById('already-played-msg');
  const rankingDiv = document.getElementById('ranking');

  const qText = document.getElementById('question');
  const answersDiv = document.getElementById('answers');
  const nextBtn = document.getElementById('next-btn');
  const status = document.getElementById('status');
  const timerDisplay = document.getElementById('timer');
  const currentScoreDiv = document.getElementById('current-score');

  const quizDiv = document.getElementById('quiz');
  const explanationDiv = document.getElementById('explanation');
  const explanationText = document.getElementById('explanation-text');

  // ===== СЪСТОЯНИЕ НА ИГРАТА =====

  let ALL_QUESTIONS = [];
  let questions = [];
  let playerId = '';
  let playerName = '';
  let idx = 0;

  // разделяме точки и верни отговори
  let points = 0;
  let correctAnswers = 0;

  let timeLeft = 20;
  let timer;
  let gameHistory = [];
  window.alreadyPlayedToday = false;
  window.currentPlayerId = null;

  // ===== ПОМОЩНИ ФУНКЦИИ =====

  function normalize(s){ return String(s).trim(); }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function lockAnswers() {
    Array.from(answersDiv.children).forEach(b => b.disabled = true);
  }

  function startTimer() {
    clearInterval(timer);
    timeLeft = 20;
    document.getElementById("seconds").textContent = `${timeLeft} сек.`;
    timerDisplay.classList.remove("warning");

    timer = setInterval(() => {
      timeLeft--;
      document.getElementById("seconds").textContent = `${timeLeft} сек.`;
      if (timeLeft <= 5) timerDisplay.classList.add("warning");

      if (timeLeft <= 0) {
        clearInterval(timer);
        lockAnswers();
        status.textContent = "⏰ Времето изтече!";
        nextBtn.disabled = false;
      }
    }, 1000);
  }

  function showHistoryScreen() {
    quizDiv.style.display = "none";
    explanationDiv.style.display = "none";
    startScreen.style.display = "none";

    let historyDiv = document.getElementById("history-screen");
    if (!historyDiv) {
      historyDiv = document.createElement("div");
      historyDiv.id = "history-screen";
      historyDiv.style.padding = "20px";
      historyDiv.style.maxWidth = "600px";
      historyDiv.style.marginTop = "20px";
      historyDiv.style.background = "rgba(255,255,255,0.08)";
      historyDiv.style.borderRadius = "12px";
      historyDiv.style.textAlign = "left";

      document.body.appendChild(historyDiv);
    }

    historyDiv.innerHTML = "<h2>📘 История на играта</h2><br>";

    gameHistory.forEach((h, i) => {
      historyDiv.innerHTML += `
        <div style="margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid #444;">
          <b>${i+1}. ${h.question}</b><br><br>
          Твоят отговор: <span style="color:${h.correct?'#2ecc71':'#e74c3c'}">${h.yourAnswer}</span><br>
          Верен отговор: <b style="color:#2ecc71">${h.correctAnswer}</b><br>
          <div style="margin-top:10px;color:#ddd"><i>${h.explanation}</i></div>
        </div>
      `;
    });

    historyDiv.innerHTML += `
      <button id="retry2-btn" class="yellow-btn" style="margin-top:20px;">Опитай пак</button>
    `;

    document.getElementById("retry2-btn").onclick = onRetryClicked;
  }

  function restartGameHard() {
    localStorage.removeItem("quiz_cocktail_progress");
    location.reload();
  }

  function onRetryClicked() {
    alreadyPlayedMsg.textContent = "Вече си играл днес.";
  }

  // ===== ЗАРЕЖДАНЕ НА ДАННИ =====

  try {
    const res = await fetch('questions.json');
    ALL_QUESTIONS = await res.json();
  } catch(e) {
    qText.textContent = "Грешка при зареждане на въпросите.";
    return;
  }

  // Последен резултат (локално, за удобство) – нов формат
  const last = JSON.parse(localStorage.getItem('quiz_cocktail_lastResult'));
  if (last) {
    lastResultDiv.innerHTML =
      `<b>Последен резултат:</b><br>
       ${last.name} — ${last.points} точки (${last.correctAnswers} верни отговора)<br>
       <small>${last.date}</small>`;
  }

  // Проверка за локален прогрес (за "Продължи")
  const saved = JSON.parse(localStorage.getItem('quiz_cocktail_progress'));
  if (saved && saved.idx < saved.total && saved.playerId) {
    continueBtn.style.display = "inline-block";
    continueBtn.textContent = `Продължи от въпрос ${saved.idx + 1}`;
  }

  // ===== ИЗБОР НА ВЪПРОСИ ПО ОБЛАСТИ =====

  function buildQuestionsForGame() {
    let selected = [];

    for (const area in AREA_DISTRIBUTION) {
      const needed = AREA_DISTRIBUTION[area] || 0;
      if (needed <= 0) continue;

      const pool = ALL_QUESTIONS.filter(q => q.area === area);
      const shuffled = shuffleArray([...pool]);
      const taken = shuffled.slice(0, needed);
      selected = selected.concat(taken);
    }

    if (selected.length > TOTAL_QUESTIONS) {
      selected = selected.slice(0, TOTAL_QUESTIONS);
    }

    selected.sort((a, b) => b.hard - a.hard);

    return selected;
  }

  // ===== РЕНДЕР НА ВЪПРОС =====

  function renderQuestion(i) {
    const q = questions[i];

    qText.textContent = `${i+1}. ${q.question}`;
    answersDiv.innerHTML = "";
    status.textContent = "";
    nextBtn.disabled = true;
    explanationDiv.style.display = "none";

    currentScoreDiv.style.display = "none";

    const shuffledAnswers = shuffleArray([...q.answers]);

    shuffledAnswers.forEach(ans => {
      const btn = document.createElement("button");
      btn.textContent = ans;

      btn.onclick = () => {
        lockAnswers();
        clearInterval(timer);

        const correct = normalize(q.correct);
        const chosen = normalize(ans);

        if (chosen === correct) {
          btn.classList.add("correct");
          status.textContent = "✅ Верен отговор!";

          // ново: броим верни + точки според номера на въпроса
          correctAnswers++;

          const questionNumber = i + 1;
          if (questionNumber <= 20) points += 1;
          else if (questionNumber <= 40) points += 2;
          else points += 3;

        } else {
          btn.classList.add("wrong");
          status.textContent = `❌ Грешно! Верният отговор е: ${q.correct}`;
          Array.from(answersDiv.children).forEach(b => {
            if (normalize(b.textContent) === correct) b.classList.add("correct");
          });
        }

        gameHistory.push({
          question: q.question,
          yourAnswer: ans,
          correctAnswer: q.correct,
          correct: chosen === correct,
          explanation: q.explanation
        });

        currentScoreDiv.textContent =
          `Текущ резултат: ${points} точки (${correctAnswers} верни отговора)`;
        currentScoreDiv.style.display = "block";

        explanationText.innerHTML = q.explanation;
        explanationDiv.style.display = "block";

        nextBtn.disabled = false;

        localStorage.setItem("quiz_cocktail_progress", JSON.stringify({
          playerId,
          name: playerName,
          idx: i,
          points,
          correctAnswers,
          total: questions.length
        }));
      };

      answersDiv.appendChild(btn);
    });

    startTimer();
  }

  // ===== СТАРТ И ПРОДЪЛЖАВАНЕ =====

  continueBtn.onclick = () => {
    if (!saved) return;
    playerId = saved.playerId;
    playerName = saved.name || PLAYERS[playerId] || playerId;
    window.currentPlayerId = playerId;

    if (alreadyPlayedToday) {
      alreadyPlayedMsg.textContent = "Днес вече си играл.";
      return;
    }

    questions = buildQuestionsForGame();

    idx = saved.idx;
    points = saved.points || 0;
    correctAnswers = saved.correctAnswers || 0;

    startScreen.style.display = "none";
    quizDiv.style.display = "block";
    renderQuestion(idx);
  };

  startBtn.onclick = async () => {
    const music = document.getElementById("bg-music");
    music.volume = 0.25;
    music.play().catch(()=>{});

    const id = playerIdInput.value.trim();
    if (!id) {
      alert("Въведете ID!");
      return;
    }

    if (!PLAYERS[id]) {
      alert("Невалидно ID!");
      return;
    }

    await checkAlreadyPlayedToday(id);
    if (alreadyPlayedToday) return;

    playerId = id;
    playerName = PLAYERS[id];
    window.currentPlayerId = playerId;

    localStorage.removeItem("quiz_cocktail_progress");

    questions = buildQuestionsForGame();
    idx = 0;
    points = 0;
    correctAnswers = 0;
    gameHistory = [];

    startScreen.style.display = "none";
    quizDiv.style.display = "block";

    renderQuestion(0);
  };

  // ===== НАВИГАЦИЯ МЕЖДУ ВЪПРОСИТЕ =====

  nextBtn.onclick = nextQuestionFromExplanation;
  document.getElementById("next-question-btn").onclick = nextQuestionFromExplanation;

  function nextQuestionFromExplanation() {
    explanationDiv.style.display = "none";
    idx++;

    if (idx >= questions.length) return finishGame();

    renderQuestion(idx);
  }

  function finishGame() {
    clearInterval(timer);

    submitResultToFirebase({
      playerId,
      playerName,
      points,
      correctAnswers,
      total: questions.length
    });

    qText.innerHTML =
      `🏁 Край на играта, <b>${playerName}</b>!<br><br>
      Резултат: <b>${points} точки</b> (${correctAnswers} верни отговора от ${questions.length}).<br><br>`;

    answersDiv.innerHTML = "";
    nextBtn.disabled = true;
    timerDisplay.textContent = "";
    currentScoreDiv.style.display = "none";

    const lastObj = {
      playerId,
      name: playerName,
      points,
      correctAnswers,
      total: questions.length,
      date: new Date().toLocaleString('bg-BG')
    };

    localStorage.setItem("quiz_cocktail_lastResult", JSON.stringify(lastObj));
    localStorage.removeItem("quiz_cocktail_progress");

    lastResultDiv.innerHTML =
      `<b>Последен резултат:</b><br>
       ${playerName} — ${points} точки (${correctAnswers} верни отговора)<br>
       <small>${lastObj.date}</small>`;

    qText.innerHTML += `
      <div style="display:flex; justify-content:center; gap:12px; margin-top:20px;">
        <button id="history-btn" class="yellow-btn">История на играта</button>
        <button id="retry-btn" class="yellow-btn">Опитай пак</button>
      </div>
    `;

    document.getElementById("history-btn").onclick = showHistoryScreen;
    document.getElementById("retry-btn").onclick = onRetryClicked;
  }

  document.getElementById("close-explanation-btn").onclick = () => {
    explanationDiv.style.display = "none";
  };

})();  // край на основния скрипт
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, doc, setDoc, getDoc,
  collection, query, orderBy, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

async function checkAlreadyPlayedToday(playerId) {
  const ref = doc(db, "games", "kokteil", "results", todayKey(), "players", playerId);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    window.alreadyPlayedToday = true;
    document.getElementById("already-played-msg").textContent = "Днес вече сте играли.";
    document.getElementById("start-btn").disabled = true;
    document.getElementById("continue-btn").style.display = "none";
    return true;
  }

  window.alreadyPlayedToday = false;
  return false;
}

function loadRanking() {
  const col = collection(db, "games", "kokteil", "results", todayKey(), "players");
  const q = query(col, orderBy("points", "desc"));

  onSnapshot(q, (snap) => {
    let html = `<h2>Куиз Коктейл - Дневна класация - ${todayKey()}</h2><ol>`;
    const rows = [];
    snap.forEach(docSnap => {
      const d = docSnap.data();
      rows.push(d);
    });

    rows.forEach(d => {
      html += `<li data-id="${d.playerId}">
        <b>${d.playerName}</b> — ${d.points} точки (${d.correctAnswers} верни отговора)
      </li>`;
    });

    html += "</ol>";
    const rankingEl = document.getElementById("ranking");
    rankingEl.innerHTML = html;

    const currentId = window.currentPlayerId;
    if (currentId) {
      const li = rankingEl.querySelector(`li[data-id="${currentId}"]`);
      if (li) {
        li.classList.add("highlight-player");
        li.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }
  });
}

async function submitResultToFirebase({ playerId, playerName, points, correctAnswers, total }) {

  // дневен резултат
  const resultRef = doc(
    db,
    "games", "kokteil",
    "results", todayKey(),
    "players", playerId
  );

  await setDoc(resultRef, {
    playerId,
    playerName,
    points,
    correctAnswers,
    total,
    timestamp: Date.now()
  });

  // архив по дни
  const archiveRef = doc(
    db,
    "games", "kokteil",
    "archive", todayKey(),
    "players", playerId
  );

  await setDoc(archiveRef, {
    playerId,
    playerName,
    points,
    correctAnswers,
    total,
    timestamp: Date.now()
  }, { merge: true });
}


// правим функциите достъпни за основния скрипт
window.submitResultToFirebase = submitResultToFirebase;
window.checkAlreadyPlayedToday = checkAlreadyPlayedToday;

// проверка при натискане на "Старт"
document.getElementById("start-btn").addEventListener("click", async () => {
  const id = document.getElementById("player-id").value.trim();
  if (!id) return;
  await checkAlreadyPlayedToday(id);
});

// зареждаме класирането
loadRanking();

</script>

</body>
</html>
