<!-- ⭐ ПРЕМЕСТЕНО НАГОРЕ — FIREBASE МОДУЛЪТ ТРЯБВА ДА Е ПЪРВИ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, doc, setDoc, getDoc,
  collection, query, orderBy, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

async function checkAlreadyPlayedToday(playerId) {
  const ref = doc(db, "games", "kokteil", "results", todayKey(), "players", playerId);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    window.alreadyPlayedToday = true;
    document.getElementById("already-played-msg").textContent = "Днес вече сте играли.";
    document.getElementById("start-btn").disabled = true;
    document.getElementById("continue-btn").style.display = "none";
    return true;
  }

  window.alreadyPlayedToday = false;
  return false;
}

function loadRanking() {
  const col = collection(db, "games", "kokteil", "results", todayKey(), "players");
  const q = query(col, orderBy("points", "desc"));

  onSnapshot(q, (snap) => {
    let html = `<h2>Куиз Коктейл - Дневна класация - ${todayKey()}</h2><ol>`;
    const rows = [];
    snap.forEach(docSnap => rows.push(docSnap.data()));

    rows.forEach(d => {
      html += `<li data-id="${d.playerId}">
        <b>${d.playerName}</b> — ${d.points} точки (${d.correctAnswers} верни отговора)
      </li>`;
    });

    html += "</ol>";
    const rankingEl = document.getElementById("ranking");
    rankingEl.innerHTML = html;

    const currentId = window.currentPlayerId;
    if (currentId) {
      const li = rankingEl.querySelector(`li[data-id="${currentId}"]`);
      if (li) {
        li.classList.add("highlight-player");
        li.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }
  });
}

async function submitResultToFirebase({ playerId, playerName, points, correctAnswers, total }) {
  console.log("SUBMIT CALLED");

  const resultRef = doc(
    db,
    "games", "kokteil",
    "results", todayKey(),
    "players", playerId
  );

  await setDoc(resultRef, {
    playerId,
    playerName,
    points,
    correctAnswers,
    total,
    timestamp: Date.now()
  });

  const archiveRef = doc(
    db,
    "games", "kokteil",
    "archive", todayKey(),
    "players", playerId
  );

  await setDoc(archiveRef, {
    playerId,
    playerName,
    points,
    correctAnswers,
    total,
    timestamp: Date.now()
  }, { merge: true });
}

window.submitResultToFirebase = submitResultToFirebase;
window.checkAlreadyPlayedToday = checkAlreadyPlayedToday;

document.getElementById("start-btn").addEventListener("click", async () => {
  const id = document.getElementById("player-id").value.trim();
  if (!id) return;
  await checkAlreadyPlayedToday(id);
});

loadRanking();
</script>
