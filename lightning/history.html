<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>История на играта</title>

  <style>
    body {
      background: #00264d;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
      color: #ffd100;
      text-shadow: 0 0 5px #ffb400;
      margin-bottom: 20px;
    }

    .entry {
      background: rgba(255,255,255,0.08);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      border-left: 6px solid #ffd100;
    }

    .correct {
      color: #00e676;
      font-weight: bold;
    }

    .wrong {
      color: #ff5252;
      font-weight: bold;
    }

    .backBtn {
      display: block;
      margin: 20px auto;
      padding: 12px 20px;
      background: #ffd100;
      color: #003344;
      border: none;
      border-radius: 8px;
      font-size: 1.2em;
      cursor: pointer;
      text-align: center;
      width: 200px;
    }
  </style>
</head>

<body>

<h1>История на играта</h1>

<div id="history"></div>

<button class="backBtn" onclick="window.history.back()">Назад</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore, doc, getDocs, collection
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Взимаме episodeId и player от URL
const params = new URLSearchParams(window.location.search);
const episodeId = params.get("episodeId");
const player = params.get("player");

const historyDiv = document.getElementById("history");

let questions = [];

// Зареждаме въпросите
async function loadQuestions() {
  const res = await fetch("questions.json");
  questions = await res.json();
}

// Зареждаме историята на играча
async function loadHistory() {
  await loadQuestions();

  const answersSnap = await getDocs(
    collection(db, "games", "lightning", "episodes", episodeId, "results", player, "answers")
  );

  const entries = [];

  answersSnap.forEach(docSnap => {
    const index = Number(docSnap.id);
    const data = docSnap.data();
    const q = questions[index];

    if (!q) return;

    const isCorrect = data.answer.trim() === q.correct.trim();

    entries.push({
      index,
      question: q.question,
      answer: data.answer,
      correct: q.correct,
      explanation: q.explanation,
      isCorrect
    });
  });

  // Подреждаме по номер на въпрос
  entries.sort((a, b) => a.index - b.index);

  // Показваме
  historyDiv.innerHTML = entries.map(e => `
    <div class="entry">
      <h3>${e.index + 1}. ${e.question}</h3>
      <p><strong>Твоят отговор:</strong> ${e.answer}</p>
      <p><strong>Верен отговор:</strong> ${e.correct}</p>
      <p><strong>Обяснение:</strong> ${e.explanation}</p>
      <p class="${e.isCorrect ? 'correct' : 'wrong'}">
        ${e.isCorrect ? '✔ Вярно' : '❌ Грешно'}
      </p>
    </div>
  `).join("");
}

loadHistory();
</script>

</body>
</html>
