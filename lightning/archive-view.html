<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Архив – Резултати</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #001f3f;
    color: white;
    padding: 20px;
  }
  h1 {
    text-align: center;
    margin-bottom: 20px;
  }
  ul {
    list-style: none;
    padding: 0;
    max-width: 500px;
    margin: 0 auto;
  }
  li {
    background: white;
    color: #0033aa;
    padding: 12px 18px;
    margin: 10px 0;
    border-radius: 8px;
  }
</style>

</head>
<body>

<h1 id="title">Резултати</h1>
<ul id="players"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, doc, getDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const episodeId = params.get("episodeId");

document.getElementById("title").textContent = "Резултати – " + episodeId;

async function loadPlayers() {
  const list = document.getElementById("players");
  const resultsRef = collection(db, "games", "lightning", "episodes", episodeId, "results");
  const snap = await getDocs(resultsRef);

  let html = "";

  snap.forEach(player => {
    html += `
      <li>
        <strong>${player.id}</strong>
      </li>`;
  });

  list.innerHTML = html || "<p>Няма намерени резултати.</p>";
}

loadPlayers();
</script>

</body>
</html>
