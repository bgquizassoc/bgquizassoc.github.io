<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>⚡ Игри на Знания - Светкавичен куиз ⚡</title>

  <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow-x: hidden; overflow-y: auto; }

  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    font-size: 18px; font-family: 'Segoe UI', Arial, sans-serif;
    max-width: 900px; margin: 0 auto; padding: 20px;
    background: #00264d;
    color: #ffffff;
  }

  h1 {
    text-align: center; color: #ffd100;
    font-size: clamp(1.5em, 4vw, 2em);
    margin: 10px auto 15px auto;
    text-shadow: 0 0 5px #ffb400;
  }

  #start-screen, #waiting-screen, #quiz, #explanation, #ranking {
    width: 100%; max-width: 600px; text-align: center;
    margin-top: 30px;
    background: rgba(255,255,255,0.05);
    border-radius: 16px; padding: 20px;
    box-shadow: 0 0 10px rgba(255,209,0,0.2);
  }

  input {
    padding: 10px; font-size: 1.1em; border-radius: 8px;
    border: 1px solid #ccc; width: 80%; margin-bottom: 10px;
  }

  button {
    margin-top: 10px; padding: 12px 20px; font-size: 1.1em;
    border-radius: 8px; border: none;
    background: #ffd100; color: #111; font-weight: bold; cursor: pointer;
  }
  button:hover { background:#ffcc33; transform:scale(1.05); }

  /* ЕДИНЕН ТАЙМЕР */
  #globalTimer {
    text-align: center; font-weight: 800; margin: 20px 0;
    font-size: clamp(1.8em, 5vw, 2.6em);
    color: #ffeb3b; text-shadow: 0 0 12px #ffcc00;
  }
  #globalTimer.warning { color: #ff4c4c; }

  #question { font-size: 1.6em; margin: 20px 0; font-weight: 600; }

  .answers button {
    display: block; width: 100%; margin: 10px 0; padding: 16px;
    border: none; border-radius: 10px; cursor: pointer;
    font-size: 1.2em; background: #333; color: #fff;
  }

  .answers button.selected {
    background: #00e5ff;
    color: #003344;
    font-weight: bold;
  }

  .stat-answer {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 16px;
    border-radius: 10px;
    background: #333;
    color: #fff;
    font-size: 1.2em;
    text-align: left;
    position: relative;
  }

  .stat-answer.correct {
    background: #2e7d32;
    font-weight: bold;
  }

  .stat-answer .pct {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.9;
  }

  #explanationText {
    font-size: 1.25em;
    line-height: 1.5em;
    margin-top: 20px;
    text-align: left;
  }

  .rank-item {
    padding: 10px;
    margin: 8px 0;
    border-radius: 10px;
    font-size: 1.2em;
    text-align: left;
  }
  .gold { background: #ffeb3b33; border-left: 6px solid #ffd700; }
  .silver { background: #c0c0c033; border-left: 6px solid #c0c0c0; }
  .bronze { background: #cd7f3233; border-left: 6px solid #cd7f32; }

  #historyBtn, #archiveBtn {
    margin-top: 20px;
    background: #00e5ff;
    color: #003344;
  }

  #lobbyTitle {
    margin-top: 20px;
    font-weight: 600;
  }

  #lobbyList {
    margin-top: 10px;
    text-align: left;
    max-height: 200px;
    overflow-y: auto;
    font-size: 0.95em;
  }

  #lobbyList div {
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .myself {
    background: #00e5ff55 !important;
    border-left: 6px solid #00e5ff !important;
    font-weight: 700;
    color: #fff !important;
  }
  </style>
</head>

<body>

<h1>Игри на Знания<br>⚡ Светкавичен куиз ⚡<br>⚡ епизод 70⚡</h1>

<!-- 🎵 МУЗИКА -->
<audio id="bg-music" src="music.mp3" loop preload="auto"></audio>

<!-- ЕДИНЕН ТАЙМЕР -->
<div id="globalTimer" style="display:none;">-</div>

<div id="start-screen">
  <p>Въведете Двете си имена:</p>
  <input type="text" id="playerName" placeholder="Име ..." />
  <button id="enterBtn">Влез в играта</button>
  <button id="archiveBtn">Архив класирания</button>
</div>

<div id="waiting-screen" style="display:none;">
  <h2 id="waitingTitle">Играта още не е започнала.</h2>
  <p>Моля, изчакайте<span id="dots">...</span></p>

  <h3 id="lobbyTitle">Стартов списък на играчите</h3>
  <p style="margin-top:10px; opacity:0.9;">Пожелаваме ви приятна игра 🙂</p>
  <div id="lobbyList">Още няма други играчи.</div>
</div>

<div id="quiz" style="display:none;">
  <div id="question"></div>
  <div id="answers" class="answers"></div>
</div>

<div id="explanation" style="display:none;">
  <h3>Статистика</h3>
  <div id="statsBlock"></div>

  <h3 style="margin-top:25px;">Обяснение</h3>
  <div id="explanationText"></div>
</div>

<div id="ranking" style="display:none;">
  <h3 id="rankingTitle">Крайно класиране</h3>
  <div id="rankingList"></div>
  <button id="historyBtn">Виж моята история</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore, doc, onSnapshot, setDoc, collection, getDocs
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const startScreen = document.getElementById("start-screen");
const waitingScreen = document.getElementById("waiting-screen");
const quizDiv = document.getElementById("quiz");
const explanationDiv = document.getElementById("explanation");
const rankingDiv = document.getElementById("ranking");

const qText = document.getElementById("question");
const answersDiv = document.getElementById("answers");
const statsBlock = document.getElementById("statsBlock");
const explanationText = document.getElementById("explanationText");
const rankingList = document.getElementById("rankingList");
const rankingTitle = document.getElementById("rankingTitle");
const historyBtn = document.getElementById("historyBtn");
const lobbyList = document.getElementById("lobbyList");

const globalTimer = document.getElementById("globalTimer");
const waitingTitle = document.getElementById("waitingTitle");

const bgMusic = document.getElementById("bg-music");

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let player = "";
let questions = [];
let ready = false;
let timerInterval = null;
let episodeId = null;

let lobbyUnsub = null;
let lobbyEpisodeId = null;

/* Архив бутон */
document.getElementById("archiveBtn").onclick = () => {
  window.location.href = "archive.html";
};

/* История бутон */
historyBtn.onclick = () => {
  if (!episodeId) return;
  window.location.href = `history.html?episodeId=${episodeId}&player=${encodeURIComponent(player)}`;
};

/* Зареждане на въпроси */
async function loadQuestions() {
  const res = await fetch("questions.json");
  questions = await res.json();
}

/* Показване само на един екран */
function showOnly(div) {
  startScreen.style.display = "none";
  waitingScreen.style.display = "none";
  quizDiv.style.display = "none";
  explanationDiv.style.display = "none";
  rankingDiv.style.display = "none";
  div.style.display = "block";
}

/* Анимация на точките */
let dotCount = 0;
setInterval(() => {
  dotCount = (dotCount + 1) % 4;
  const dotsEl = document.getElementById("dots");
  if (dotsEl) dotsEl.textContent = ".".repeat(dotCount);
}, 400);

/* Таймер */
function updateTimer(startTime, duration) {
  const now = Date.now();
  const remaining = Math.max(0, Math.ceil((duration - (now - startTime)) / 1000));
  globalTimer.textContent = remaining;

  if (remaining <= 5) globalTimer.classList.add("warning");
  else globalTimer.classList.remove("warning");
}

/* Детерминирано разбъркване */
function seededShuffle(array, seed) {
  let result = array.slice();
  let s = seed;
  for (let i = result.length - 1; i > 0; i--) {
    s = (s * 9301 + 49297) % 233280;
    const j = Math.floor((s / 233280) * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}
/* Временно / крайно класиране */
function updateRankingTitle(index) {
  const isLast = index >= questions.length - 1;
  rankingTitle.textContent = isLast ? "Крайно класиране" : "Временно класиране";
  historyBtn.style.display = isLast ? "block" : "none";
}

/* Влизане в играта */
document.getElementById("enterBtn").onclick = async () => {
  player = document.getElementById("playerName").value.trim();
  if (!player) return alert("Въведете име!");

  await loadQuestions();
  ready = true;
  showOnly(waitingScreen);

  globalTimer.style.display = "none";

  if (bgMusic) {
    bgMusic.volume = 0.35;
    bgMusic.play().catch(() => {});
  }

  if (!episodeId) return;

  await setDoc(
    doc(db, "games", "lightning", "episodes", episodeId, "lobby", player),
    { joinedAt: Date.now() },
    { merge: true }
  );

  // ⭐ FIX: веднага при влизане прилагаме текущата фаза
  if (lastPhaseSnapshot) applyPhaseImmediately(lastPhaseSnapshot);
};

/* Обяснение + статистика */
async function renderExplanation(index) {
  showOnly(explanationDiv);
  statsBlock.innerHTML = "";
  explanationText.textContent = "";

  const q = questions[index];
  if (!q) return;

  const correct = (q.correct || "").trim();
  explanationText.textContent = q.explanation || "";

  const playersSnap = await getDocs(
    collection(db, "games", "lightning", "episodes", episodeId, "results")
  );

  const counts = {};
  q.answers.forEach(a => counts[a.trim()] = 0);

  for (const playerDoc of playersSnap.docs) {
    const ansSnap = await getDocs(
      collection(db, "games", "lightning", "episodes", episodeId, "results", playerDoc.id, "answers")
    );
    const ansDoc = ansSnap.docs.find(d => d.id === String(index));
    if (ansDoc) {
      const chosen = (ansDoc.data().answer || "").trim();
      if (counts[chosen] !== undefined) counts[chosen]++;
    }
  }

  const total = Object.values(counts).reduce((a, b) => a + b, 0);

  let html = "";
  q.answers.forEach(a => {
    const key = a.trim();
    const c = counts[key] || 0;
    const pct = total ? Math.round((c / total) * 100) : 0;
    const isCorrect = key === correct;

    html += `
      <div class="stat-answer ${isCorrect ? "correct" : ""}">
        ${a}
        <span class="pct">${pct}%</span>
        ${isCorrect ? " ✔" : ""}
      </div>
    `;
  });

  statsBlock.innerHTML = html;
}

/* Класиране с тайбрек по време */
async function renderRanking(index) {
  showOnly(rankingDiv);
  rankingList.innerHTML = "";

  const playersSnap = await getDocs(
    collection(db, "games", "lightning", "episodes", episodeId, "results")
  );

  const scores = {};

  for (const playerDoc of playersSnap.docs) {
    const playerName = playerDoc.id;

    const answersSnap = await getDocs(
      collection(db, "games", "lightning", "episodes", episodeId, "results", playerName, "answers")
    );

    let totalPoints = 0;
    let totalTime = 0;

    answersSnap.forEach(ansDoc => {
      const qIndex = Number(ansDoc.id);
      const data = ansDoc.data();
      const q = questions[qIndex];
      if (!q) return;

      if ((data.answer || "").trim() === (q.correct || "").trim()) {
        if (qIndex < 10) totalPoints += 1;
        else if (qIndex < 20) totalPoints += 2;
        else totalPoints += 3;
      }

      if (typeof data.thinkingTime === "number") {
        totalTime += data.thinkingTime;
      }
    });

    scores[playerName] = { points: totalPoints, time: totalTime };
  }

  const sorted = Object.entries(scores).sort((a, b) => {
    const ap = a[1].points;
    const bp = b[1].points;
    if (bp !== ap) return bp - ap;

    const at = a[1].time;
    const bt = b[1].time;
    if (at !== bt) return at - bt;

    return a[0].localeCompare(b[0], "bg");
  });

 rankingList.innerHTML = sorted
  .map(([name, obj], i) => {
    const pts = obj.points;
    const time = (obj.time / 1000).toFixed(1);
    const isLast = index >= questions.length - 1;

    let cls = "";
    const isMe = name === player;
    let medal = "";

    if (i === 0) { cls = "gold"; medal = "🥇"; }
    else if (i === 1) { cls = "silver"; medal = "🥈"; }
    else if (i === 2) { cls = "bronze"; medal = "🥉"; }

    const timeText = isLast ? ` (време: ${time} сек)` : "";

    return `<div class="rank-item ${cls} ${isMe ? 'myself' : ''}">
        ${i+1}. ${medal} ${name} — ${pts} т.${timeText}
      </div>`;
  })
  .join("");

  updateRankingTitle(index);
}

/* ⭐ FIX: запомняме последната снимка на фазата */
let lastPhaseSnapshot = null;

/* ⭐ FIX: функция за прилагане на фазата веднага след влизане */
function applyPhaseImmediately(data) {
  const { index, phase, startTime, duration } = data;

  if (timerInterval) clearInterval(timerInterval);

  if (phase === "lobby") {
    showOnly(waitingScreen);
    globalTimer.style.display = "none";
    waitingTitle.textContent = "Играта още не е започнала.";
    return;
  }

  if (phase === "prestart") {
    showOnly(waitingScreen);
    waitingTitle.textContent = "Играта започва след:";
    globalTimer.style.display = "block";
    timerInterval = setInterval(() => updateTimer(startTime, duration), 200);
    return;
  }

  if (phase === "question") {
    showOnly(quizDiv);
    globalTimer.style.display = "block";

    const q = questions[index];
    if (!q) return;

    qText.textContent = `${index+1}. ${q.question}`;
    answersDiv.innerHTML = "";

    const seed = episodeId.length * 1000 + index;
    const shuffled = seededShuffle(q.answers, seed);

    shuffled.forEach(ans => {
      const btn = document.createElement("button");
      btn.textContent = ans;

      btn.onclick = async () => {
        btn.classList.add("selected");
        Array.from(answersDiv.children).forEach(b => b.disabled = true);

        await setDoc(
          doc(db, "games", "lightning", "episodes", episodeId, "results", player),
          { exists: true },
          { merge: true }
        );

        const thinkingTime = Date.now() - startTime;

        await setDoc(
          doc(db, "games", "lightning", "episodes", episodeId, "results", player, "answers", String(index)),
          {
            answer: ans,
            correct: q.correct,
            explanation: q.explanation,
            timestamp: Date.now(),
            thinkingTime
          }
        );
      };

      answersDiv.appendChild(btn);
    });

    timerInterval = setInterval(() => updateTimer(startTime, duration), 200);
    return;
  }

  if (phase === "explanation") {
    globalTimer.style.display = "block";
    renderExplanation(index);
    timerInterval = setInterval(() => updateTimer(startTime, duration), 200);
    return;
  }

  if (phase === "ranking") {
    globalTimer.style.display = "block";
    renderRanking(index);
    timerInterval = setInterval(() => updateTimer(startTime, duration), 200);
    return;
  }
}

/* Слушане на фазите */
onSnapshot(doc(db, "games", "lightning", "state", "current"), async snap => {
  if (!snap.exists()) return;

  const data = snap.data();
  lastPhaseSnapshot = data; // ⭐ FIX

  episodeId = data.episodeId;
  if (!episodeId) return;

  const { index, phase, startTime, duration } = data;

  if (!lobbyUnsub || lobbyEpisodeId !== episodeId) {
    if (lobbyUnsub) lobbyUnsub();
    lobbyEpisodeId = episodeId;
    lobbyUnsub = onSnapshot(
      collection(db, "games", "lightning", "episodes", episodeId, "lobby"),
      lobbySnap => {
        const names = lobbySnap.docs.map(d => d.id);
        lobbyList.innerHTML = names.length
          ? names.map(n => `<div>${n}</div>`).join("")
          : "Още няма други играчи.";
      }
    );
  }

  if (!ready) return;

  applyPhaseImmediately(data);
});
</script>

</body>
</html>
