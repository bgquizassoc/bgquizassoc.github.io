<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Игри на Знания – Светкавичен Куиз</title>

<style>
body {
  background: #0b1e39;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
  padding: 0;
}

h1 {
  background: #ffd54f;
  color: #000;
  padding: 15px;
  margin: 0;
  font-size: 26px;
  font-weight: bold;
}

#loginScreen, #waitingScreen, #questionScreen, #explanationScreen, #rankingScreen {
  display: none;
  padding: 20px;
}

.answer-btn {
  width: 90%;
  max-width: 500px;
  padding: 15px;
  margin: 10px auto;
  background: #1e3a5f;
  border: 2px solid #fff;
  border-radius: 8px;
  color: white;
  font-size: 20px;
  cursor: pointer;
  transition: 0.2s;
}

.answer-btn:hover {
  background: #2a4f7a;
}

.answer-selected {
  background: #9ecbff !important; /* светлосин фон */
  border: 3px solid #003366 !important;
  color: #000 !important;
  font-weight: 700;
}

.answer-disabled {
  opacity: 0.5;
  pointer-events: none;
}

#timer {
  font-size: 32px;
  margin: 15px 0;
  font-weight: bold;
}

.stat-block {
  background: #102544;
  padding: 15px;
  margin-top: 20px;
  border-radius: 8px;
  text-align: left;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

.stat-line {
  margin: 6px 0;
  font-size: 18px;
}

.correct-mark {
  color: #00ff00;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Игри на Знания<br>⚡ Светкавичен куиз ⚡<br>⚡ епизод тест 12⚡</h1>

<div id="loginScreen">
  <h2>Въведи име</h2>
  <input id="playerName" type="text" style="padding:10px;font-size:18px;">
  <br><br>
  <button onclick="login()" style="padding:10px 20px;font-size:18px;">Влизане</button>
</div>

<div id="waitingScreen">
  <h2>Играта още не е започнала…</h2>
</div>

<div id="questionScreen">
  <h2 id="questionText"></h2>
  <div id="answers"></div>
  <div id="timer"></div>
</div>

<div id="explanationScreen">
  <div id="explanationContent"></div>
</div>

<div id="rankingScreen">
  <h2 id="rankingTitle"></h2>
  <div id="rankingList"></div>
  <button onclick="showHistory()" style="margin-top:20px;padding:10px 20px;font-size:18px;">Виж моята история</button>
</div>

<script type="module">
import {
  initializeApp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore, doc, getDoc, setDoc, onSnapshot,
  collection, getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-EXAMPLE",
  authDomain: "cifromania.firebaseapp.com",
  projectId: "cifromania",
  storageBucket: "cifromania.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abc123"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let player = null;
let episodeId = null;
let questions = [];
let currentIndex = 0;
let currentPhase = "waiting";
let duration = 5000;
let startTime = 0;

function show(screen) {
  document.querySelectorAll("#loginScreen,#waitingScreen,#questionScreen,#explanationScreen,#rankingScreen")
    .forEach(s => s.style.display = "none");
  document.getElementById(screen).style.display = "block";
}

window.login = async function () {
  player = document.getElementById("playerName").value.trim();
  if (!player) return;

  await setDoc(doc(db, "games", "lightning", "players", player), { joined: Date.now() }, { merge: true });

  show("waitingScreen");
};
  // слушаме състоянието
onSnapshot(doc(db, "games", "lightning", "state", "current"), async (snap) => {
  if (!snap.exists()) return;

  const data = snap.data();
  episodeId = data.episodeId;
  currentIndex = data.index;
  currentPhase = data.phase;
  duration = data.duration;
  startTime = data.startTime;

  const epSnap = await getDoc(doc(db, "games", "lightning", "episodes", episodeId));
  if (epSnap.exists()) questions = epSnap.data().questions || [];

  if (currentPhase === "waiting") show("waitingScreen");
  if (currentPhase === "question") renderQuestion();
  if (currentPhase === "explanation") renderExplanation();
  if (currentPhase === "ranking") renderRanking();
});

// показваме въпрос
async function renderQuestion() {
  const q = questions[currentIndex];
  if (!q) return;

  show("questionScreen");
  document.getElementById("questionText").textContent = q.question;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.answers.forEach(ans => {
    const btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.textContent = ans;

    btn.onclick = async () => {
      btn.classList.add("answer-selected");

      Array.from(answersDiv.children).forEach(b => {
        b.classList.add("answer-disabled");
        b.disabled = true;
      });

      await setDoc(
        doc(db, "games", "lightning", "episodes", episodeId, "results", player),
        { exists: true },
        { merge: true }
      );

      await setDoc(
        doc(db, "games", "lightning", "episodes", episodeId, "results", player, "answers", String(currentIndex)),
        {
          answer: ans,
          correct: q.correct,
          explanation: q.explanation,
          timestamp: Date.now()
        }
      );
    };

    answersDiv.appendChild(btn);
  });

  startTimer();
}

// таймер
function startTimer() {
  const timerDiv = document.getElementById("timer");

  function tick() {
    const now = Date.now();
    const left = duration - (now - startTime);

    if (left <= 0) {
      timerDiv.textContent = "0";
      return;
    }

    timerDiv.textContent = Math.ceil(left / 1000);
    requestAnimationFrame(tick);
  }

  tick();
}

// обяснение + статистика
async function renderExplanation() {
  show("explanationScreen");

  const q = questions[currentIndex];
  const correct = q.correct.trim();

  const answersSnap = await getDocs(
    collection(db, "games", "lightning", "episodes", episodeId, "results")
  );

  let counts = {};
  q.answers.forEach(a => counts[a.trim()] = 0);

  for (const playerDoc of answersSnap.docs) {
    const ansSnap = await getDocs(
      collection(db, "games", "lightning", "episodes", episodeId, "results", playerDoc.id, "answers")
    );

    const ansDoc = ansSnap.docs.find(d => d.id === String(currentIndex));
    if (ansDoc) {
      const chosen = ansDoc.data().answer.trim();
      if (counts[chosen] !== undefined) counts[chosen]++;
    }
  }

  const total = Object.values(counts).reduce((a,b) => a+b, 0);

  let html = `<div class="stat-block">`;
  html += `<h3>Верният отговор: <span class="correct-mark">${correct} ✔</span></h3>`;
  html += `<h4>Статистика:</h4>`;

  q.answers.forEach(a => {
    const c = counts[a.trim()];
    const pct = total ? Math.round((c / total) * 100) : 0;
    const mark = a.trim() === correct ? "✔" : "";
    html += `<div class="stat-line">${a} — ${c} души (${pct}%) ${mark}</div>`;
  });

  html += `<h4 style="margin-top:15px;">Обяснение:</h4>`;
  html += `<div>${q.explanation}</div>`;
  html += `</div>`;

  document.getElementById("explanationContent").innerHTML = html;
}

// класиране
async function renderRanking() {
  show("rankingScreen");

  const resultsSnap = await getDocs(
    collection(db, "games", "lightning", "episodes", episodeId, "results")
  );

  let ranking = [];

  for (const playerDoc of resultsSnap.docs) {
    const answersSnap = await getDocs(
      collection(db, "games", "lightning", "episodes", episodeId, "results", playerDoc.id, "answers")
    );

    let score = 0;
    answersSnap.forEach(a => {
      if (a.data().answer.trim() === a.data().correct.trim()) score++;
    });

    ranking.push({ name: playerDoc.id, score });
  }

  ranking.sort((a,b) => b.score - a.score);

  document.getElementById("rankingTitle").textContent =
    currentIndex >= questions.length - 1 ? "Крайно класиране" : "Временно класиране";

  let html = "";
  ranking.forEach((r, i) => {
    html += `<div>${i+1}. ${r.name} — ${r.score} т.</div>`;
  });

  document.getElementById("rankingList").innerHTML = html;
}

window.showHistory = function () {
  alert("Историята ще я довършим след статистиката.");
};

document.addEventListener("DOMContentLoaded", () => {
  show("loginScreen");
});
</script>
</body>
</html>
