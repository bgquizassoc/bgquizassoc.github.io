<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Светкавичен куиз – Играч</title>
<style>
  body {
    background:#001a33;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
  }
  #timer {
    font-size:2.2em;
    margin:15px 0;
    color:#ffd100;
    font-weight:bold;
  }
  #answers button {
    display:block;
    width:90%;
    margin:10px auto;
    padding:15px;
    font-size:1.2em;
    border:none;
    border-radius:10px;
    background:#ffd100;
    color:#111;
    cursor:pointer;
  }
</style>
</head>

<body>

<!-- 🎵 МУЗИКА ЗА ЦЯЛАТА ИГРА -->
<audio id="bg-music" src="music.mp3" loop preload="auto"></audio>

<h1>Игри на Знания<br>⚡ Светкавичен куиз ⚡<br>⚡ епизод тест 25 ⚡</h1>
<h2 id="episode"></h2>

<div id="lobby-screen" style="display:none;">
  <h3>Стартов списък на играчите</h3>
  <p>Да им пожелаем приятна игра 🙂</p>
  <ul id="lobby-list"></ul>
</div>

<div id="game-screen" style="display:none;">
  <div id="timer"></div>
  <h2 id="question"></h2>
  <div id="answers"></div>

  <div id="explanation" style="display:none; margin-top:20px;"></div>
  <div id="ranking" style="display:none; margin-top:20px;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, onSnapshot, setDoc, collection, query, onSnapshot as onSnap
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🎵 Пускаме музиката веднага щом играчът влезе
document.getElementById("bg-music").volume = 0.35;

// Взимаме името на играча
let playerName = localStorage.getItem("lightningName");
if (!playerName) {
  playerName = prompt("Въведете Вашето име:");
  localStorage.setItem("lightningName", playerName);
}

// Показваме епизода
const episodeEl = document.getElementById("episode");

// Таймер
let timerInterval = null;

function startTimer(durationMs) {
  clearInterval(timerInterval);

  let remaining = Math.floor(durationMs / 1000);
  document.getElementById("timer").innerText = remaining + " сек.";

  timerInterval = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(timerInterval);
      document.getElementById("timer").innerText = "0 сек.";
    } else {
      document.getElementById("timer").innerText = remaining + " сек.";
    }
  }, 1000);
}

// Лоби
function showLobby(players) {
  document.getElementById("lobby-screen").style.display = "block";
  document.getElementById("game-screen").style.display = "none";

  const list = document.getElementById("lobby-list");
  list.innerHTML = "";
  players.forEach(p => {
    const li = document.createElement("li");
    li.innerText = p;
    list.appendChild(li);
  });

  // 🎵 Пускаме музиката
  document.getElementById("bg-music").play();
}

// Игра
function showQuestion(q, answers, duration) {
  document.getElementById("lobby-screen").style.display = "none";
  document.getElementById("game-screen").style.display = "block";

  document.getElementById("explanation").style.display = "none";
  document.getElementById("ranking").style.display = "none";

  document.getElementById("question").innerText = q;

  const ansDiv = document.getElementById("answers");
  ansDiv.innerHTML = "";

  answers.forEach((a, i) => {
    const btn = document.createElement("button");
    btn.innerText = a;
    btn.onclick = () => sendAnswer(i);
    ansDiv.appendChild(btn);
  });

  startTimer(duration);
}

function showExplanation(text, duration) {
  document.getElementById("answers").innerHTML = "";
  document.getElementById("explanation").innerText = text;
  document.getElementById("explanation").style.display = "block";
  document.getElementById("ranking").style.display = "none";

  startTimer(duration);
}

function showRanking(html, duration) {
  document.getElementById("answers").innerHTML = "";
  document.getElementById("explanation").style.display = "none";
  document.getElementById("ranking").innerHTML = html;
  document.getElementById("ranking").style.display = "block";

  startTimer(duration);
}

// Изпращане на отговор
async function sendAnswer(index) {
  const stateSnap = await getDoc(doc(db, "games", "lightning", "state", "current"));
  const ep = stateSnap.data().episodeId;

  await setDoc(
    doc(db, "games", "lightning", "episodes", ep, "results", playerName),
    { answer: index },
    { merge: true }
  );
}

// Слушаме състоянието
onSnapshot(doc(db, "games", "lightning", "state", "current"), async (snap) => {
  if (!snap.exists()) return;

  const data = snap.data();
  episodeEl.innerText = "⚡ епизод " + data.episodeId + " ⚡";

  const ep = data.episodeId;
  const phase = data.phase;
  const index = data.index;
  const duration = data.duration;

  // Лоби
  if (phase === "waiting") {
    const qLobby = query(collection(db, "games", "lightning", "episodes", ep, "lobby"));
    onSnap(qLobby, (playersSnap) => {
      const players = playersSnap.docs.map(d => d.id);
      showLobby(players);
    });
    return;
  }

  // Зареждаме въпросите
  const res = await fetch("lightning/questions.json");
  const questions = await res.json();
  const q = questions[index];

  if (phase === "question") {
    showQuestion(q.question, q.answers, duration);
  }

  if (phase === "explanation") {
    showExplanation(q.explanation, duration);
  }

  if (phase === "ranking") {
    showRanking("<h3>Класиране...</h3>", duration);
  }
});
</script>

</body>
</html>
