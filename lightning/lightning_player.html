<!doctype html>
<html lang="bg">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Светкавичен куиз – Играч</title>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background:#00264d;
    color:white;
    padding:20px;
    max-width:900px;
    margin:auto;
    text-align:center;
  }
  h1 {
    color:#ffd100;
    text-shadow:0 0 5px #ffb400;
    margin-bottom:20px;
  }
  #quizBox {
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:16px;
    max-width:600px;
    margin:auto;
    display:none;
  }
  #timer {
    font-size:2em;
    font-weight:800;
    color:#ffeb3b;
    text-shadow:0 0 12px #ffcc00;
    margin-bottom:20px;
  }
  #timer.warning { color:#ff4c4c; }
  #question { font-size:1.5em; margin:20px 0; }
  .answers button {
    width:100%; padding:14px; margin:8px 0;
    background:#333; color:white; border:none;
    border-radius:10px; font-size:1.2em; cursor:pointer;
  }
  .answers button.correct { background:#2e7d32; }
  .answers button.wrong { background:#b71c1c; }
  #explanationBox, #rankingBox {
    display:none;
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:12px;
    max-width:600px;
    margin:20px auto;
  }
</style>
</head>

<body>

<h1>⚡ Светкавичен куиз ⚡</h1>

<div id="nameBox">
  <p>Въведете име:</p>
  <input id="playerName" style="padding:10px; width:80%; border-radius:8px;">
  <button id="startBtn" style="margin-top:10px; padding:10px 20px;">Старт</button>
</div>

<div id="quizBox">
  <div id="timer"><span id="timeLeft">-</span> сек.</div>
  <div id="question"></div>
  <div id="answers" class="answers"></div>
</div>

<div id="explanationBox">
  <h3>Обяснение</h3>
  <div id="explanationText"></div>
</div>

<div id="rankingBox">
  <h3>Класиране</h3>
  <div id="rankingList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore, doc, onSnapshot, setDoc, collection, getDocs
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let player = "";
let questions = [];

const nameBox = document.getElementById("nameBox");
const quizBox = document.getElementById("quizBox");
const explanationBox = document.getElementById("explanationBox");
const rankingBox = document.getElementById("rankingBox");

const qText = document.getElementById("question");
const answersDiv = document.getElementById("answers");
const timeLeftEl = document.getElementById("timeLeft");
const explanationText = document.getElementById("explanationText");
const rankingList = document.getElementById("rankingList");

function normalize(s){ return String(s).trim(); }

async function loadQuestions() {
  const res = await fetch("questions.json");
  questions = await res.json();
}

function showPhase(phase) {
  quizBox.style.display = phase === "question" ? "block" : "none";
  explanationBox.style.display = phase === "explanation" ? "block" : "none";
  rankingBox.style.display = phase === "ranking" ? "block" : "none";
}

function renderQuestion(i) {
  const q = questions[i];
  qText.textContent = `${i+1}. ${q.question}`;
  answersDiv.innerHTML = "";

  q.answers.forEach(ans => {
    const btn = document.createElement("button");
    btn.textContent = ans;

    btn.onclick = async () => {
      const correct = normalize(q.correct);
      const chosen = normalize(ans);

      if (chosen === correct) btn.classList.add("correct");
      else {
        btn.classList.add("wrong");
        Array.from(answersDiv.children).forEach(b => {
          if (normalize(b.textContent) === correct) b.classList.add("correct");
        });
      }

      await setDoc(doc(db, "games", "lightning", "results", player, String(i)), {
        answer: ans,
        correct: q.correct,
        timestamp: Date.now()
      });
    };

    answersDiv.appendChild(btn);
  });
}

async function renderRanking() {
  const snap = await getDocs(collection(db, "games", "lightning", "results"));
  const scores = {};

  snap.forEach(docSnap => {
    const pid = docSnap.id;
    const answers = docSnap.data();

    let total = 0;
    for (const qIndex in answers) {
      const q = questions[qIndex];
      const correct = normalize(q.correct);
      const chosen = normalize(answers[qIndex].answer);

      if (chosen === correct) {
        if (qIndex < 10) total += 1;
        else if (qIndex < 20) total += 2;
        else total += 3;
      }
    }
    scores[pid] = total;
  });

  const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);

  rankingList.innerHTML = sorted
    .map(([name, pts]) => `<div>${name}: ${pts} т.</div>`)
    .join("");
}

function updateTimer(startTime, duration) {
  const now = Date.now();
  const remaining = Math.max(0, Math.ceil((duration - (now - startTime)) / 1000));
  timeLeftEl.textContent = remaining;

  if (remaining <= 5) document.getElementById("timer").classList.add("warning");
  else document.getElementById("timer").classList.remove("warning");
}

document.getElementById("startBtn").onclick = async () => {
  player = document.getElementById("playerName").value.trim();
  if (!player) return alert("Въведете име!");

  nameBox.style.display = "none";
  await loadQuestions();

  onSnapshot(doc(db, "games", "lightning", "state", "current"), snap => {
    if (!snap.exists()) return;

    const { index, phase, startTime } = snap.data();

    showPhase(phase);

    if (phase === "question") renderQuestion(index);
    if (phase === "explanation") {
      explanationText.textContent = questions[index].explanation;
    }
    if (phase === "ranking") renderRanking();

    const phaseDur = phase === "question" ? 20000 :
                     phase === "explanation" ? 30000 : 10000;

    setInterval(() => updateTimer(startTime, phaseDur), 200);
  });
};
</script>

</body>
</html>
