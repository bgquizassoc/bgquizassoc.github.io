<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Архив на Светкавичния куиз</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #00264d;
    padding: 20px;
    color: white;
  }
  h1 {
    text-align: center;
    margin-bottom: 30px;
    color: white;
  }
  ul {
    list-style: none;
    padding: 0;
    max-width: 400px;
    margin: 0 auto;
  }
  li {
    background: white;
    color: #0033aa;
    padding: 12px 18px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccd7ff;
    transition: 0.2s;
  }
  li:hover {
    background: #e8eeff;
    transform: translateX(4px);
  }
  a {
    font-size: 20px;
    color: #0033aa;
    text-decoration: none;
    display: block;
  }
</style>

</head>
<body>

<h1>Архив на Светкавичния куиз</h1>
<ul id="episodes"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, doc, getDoc
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadEpisodes() {
  const list = document.getElementById("episodes");
  const snap = await getDocs(collection(db, "games", "lightning", "episodes"));

  let episodes = [];

  for (const ep of snap.docs) {
    const id = ep.id;

    const summaryRef = doc(db, "games", "lightning", "episodes", id, "summary");
    const summarySnap = await getDoc(summaryRef);

    let fullName = id;
    if (summarySnap.exists()) {
      const data = summarySnap.data();
      fullName = data.fullName || id;
    }

    episodes.push({ id, fullName });
  }

  episodes.sort((a, b) => b.id.localeCompare(a.id));

  let html = "";
  episodes.forEach(ep => {
    html += `
      <li>
        <a href="archive-view.html?episodeId=${encodeURIComponent(ep.id)}">
          ${ep.fullName}
        </a>
      </li>`;
  });

  list.innerHTML = html || "<p>Все още няма архивирани игри.</p>";
}

loadEpisodes();
</script>

</body>
</html>
