<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Куиз Сървайвър – Архив за деня</title>
<style>
  body { font-family: Arial; background:#eef; padding:20px; }
  h1 { text-align:center; }
  ol { font-size:20px; }
</style>
</head>
<body>

<h1 id="title">Архив</h1>
<ol id="players"></ol>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, query, orderBy
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const date = params.get("date");

document.getElementById("title").innerText = "Архив за " + date;

async function loadPlayers() {
  const list = document.getElementById("players");

  const q = query(
    collection(db, "games", "survivor", "archive", date, "players"),
    orderBy("maxQuestionReached", "desc")
  );

  const snap = await getDocs(q);

  let pos = 1;
  let html = "";

  snap.forEach(doc => {
    const d = doc.data();
    html += `<li>${pos}. ${d.playerName} — ${d.maxQuestionReached} въпросa</li>`;
    pos++;
  });

  list.innerHTML = html || "<p>Няма данни за този ден.</p>";
}

loadPlayers();
</script>

</body>
</html>
