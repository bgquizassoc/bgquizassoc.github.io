<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Куиз Сървайвър – Архив</title>
<style>
  body { font-family: Arial; background:#eef; padding:20px; }
  h1 { text-align:center; }
  ul { list-style:none; padding:0; }
  li { margin:10px 0; }
  a { font-size:20px; color:#0033aa; text-decoration:none; }
  a:hover { text-decoration:underline; }
</style>
</head>
<body>

<h1>Куиз Сървайвър – Архив</h1>
<ul id="days"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getFirestore, collection, getDocs
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadArchiveDays() {
  const list = document.getElementById("days");
  const snap = await getDocs(collection(db, "games", "survivor", "archive"));

  let html = "";
  snap.forEach(doc => {
    const day = doc.id;
    html += `<li><a href="survivor_archive_day.html?date=${day}">${day}</a></li>`;
  });

  list.innerHTML = html || "<p>Все още няма архивирани дни.</p>";
}

loadArchiveDays();
</script>

</body>
</html>
