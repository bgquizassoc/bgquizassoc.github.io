<script>
(async function(){

  // ===== НАСТРОЙКИ НА ИГРАТА =====

  const AREA_DISTRIBUTION = {
    "География": 9, "История": 9, "Философия": 2, "Митология": 2,
    "Религия": 2, "Изкуство": 7, "Кулинария": 4, "Кино": 9,
    "Литература": 8, "Музика": 8, "Наука": 8, "Архитектура": 2,
    "Астрономия": 6, "Биология": 6, "Физика": 6, "Химия": 6,
    "Спорт": 8, "Футбол": 8
  };

  const TOTAL_QUESTIONS = 110;

  // ===== DOM ЕЛЕМЕНТИ =====

  const startScreen = document.getElementById('start-screen');
  const playerIdInput = document.getElementById('player-id');
  const startBtn = document.getElementById('start-btn');
  const continueBtn = document.getElementById('continue-btn');
  const lastResultDiv = document.getElementById('last-result');
  const alreadyPlayedMsg = document.getElementById('already-played-msg');
  const rankingDiv = document.getElementById('ranking');

  const qText = document.getElementById('question');
  const answersDiv = document.getElementById('answers');
  const nextBtn = document.getElementById('next-btn');
  const status = document.getElementById('status');
  const timerDisplay = document.getElementById('timer');
  const currentScoreDiv = document.getElementById('current-score');

  const quizDiv = document.getElementById('quiz');
  const explanationDiv = document.getElementById('explanation');
  const explanationText = document.getElementById('explanation-text');

  const finalLeaderboard = document.getElementById("final-leaderboard");

  // ===== СЪСТОЯНИЕ НА ИГРАТА =====

  let ALL_QUESTIONS = [];
  let questions = [];
  let playerId = '';
  let playerName = '';
  let idx = 0;
  let lives = 3;
  let timer;
  let timeLeft = 20;
  let gameHistory = [];
  window.alreadyPlayedToday = false;

  // ===== ПОМОЩНИ ФУНКЦИИ =====

  function normalize(s){ return String(s).trim(); }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function lockAnswers() {
    Array.from(answersDiv.children).forEach(b => b.disabled = true);
  }

  function updateLivesUI() {
    currentScoreDiv.style.display = "block";
    currentScoreDiv.textContent = `Остават ти още ${lives} живота`;
  }

  function getTimeForQuestion(n) {
    if (n <= 40) return 20;
    if (n <= 50) return 15;
    if (n <= 60) return 12;
    if (n <= 70) return 10;
    if (n <= 80) return 8;
    if (n <= 90) return 6;
    return 4;
  }

  function startTimer() {
    clearInterval(timer);

    const qNumber = idx + 1;
    timeLeft = getTimeForQuestion(qNumber);

    document.getElementById("seconds").textContent = `${timeLeft} сек.`;
    timerDisplay.classList.remove("warning");

    timer = setInterval(() => {
      timeLeft--;
      document.getElementById("seconds").textContent = `${timeLeft} сек.`;

      if (timeLeft <= 5) timerDisplay.classList.add("warning");

      if (timeLeft <= 0) {
        clearInterval(timer);
        lockAnswers();
        status.textContent = "⏰ Времето изтече!";

        lives--;
        updateLivesUI();

        if (lives <= 0) {
          finishGame("lives");
          return;
        }

        nextBtn.disabled = false;
      }
    }, 1000);
  }

  // ===== ИСТОРИЯ НА ИГРАТА =====

  function showHistoryScreen() {
    quizDiv.style.display = "none";
    explanationDiv.style.display = "none";
    startScreen.style.display = "none";
    finalLeaderboard.style.display = "none";

    let historyDiv = document.getElementById("history-screen");
    if (!historyDiv) {
      historyDiv = document.createElement("div");
      historyDiv.id = "history-screen";
      historyDiv.style.padding = "20px";
      historyDiv.style.maxWidth = "600px";
      historyDiv.style.marginTop = "20px";
      historyDiv.style.background = "rgba(255,255,255,0.08)";
      historyDiv.style.borderRadius = "12px";
      historyDiv.style.textAlign = "left";
      document.body.appendChild(historyDiv);
    }

    historyDiv.innerHTML = "<h2>📘 История на играта</h2><br>";

    gameHistory.forEach((h, i) => {
      historyDiv.innerHTML += `
        <div style="margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid #444;">
          <b>${i+1}. ${h.question}</b><br><br>
          Твоят отговор: <span style="color:${h.correct?'#2ecc71':'#e74c3c'}">${h.yourAnswer}</span><br>
          Верен отговор: <b style="color:#2ecc71">${h.correctAnswer}</b><br>
          <div style="margin-top:10px;color:#ddd"><i>${h.explanation}</i></div>
        </div>
      `;
    });

    historyDiv.innerHTML += `
      <button id="retry2-btn" class="yellow-btn" style="margin-top:20px;">Опитай пак</button>
    `;

    document.getElementById("retry2-btn").onclick = onRetryClicked;
  }

  function onRetryClicked() {
    alreadyPlayedMsg.textContent = "Вече си играл днес.";
  }

  // ===== ЗАРЕЖДАНЕ НА ВЪПРОСИ =====

  try {
    const res = await fetch('questions.json');
    ALL_QUESTIONS = await res.json();
  } catch(e) {
    qText.textContent = "Грешка при зареждане на въпросите.";
    return;
  }

  // ===== ИЗБОР НА ВЪПРОСИ ПО ОБЛАСТИ =====

  function buildQuestionsForGame() {
    let selected = [];

    for (const area in AREA_DISTRIBUTION) {
      const needed = AREA_DISTRIBUTION[area] || 0;
      if (needed <= 0) continue;

      const pool = ALL_QUESTIONS.filter(q => q.area === area);
      const shuffled = shuffleArray([...pool]);
      const taken = shuffled.slice(0, needed);
      selected = selected.concat(taken);
    }

    if (selected.length > TOTAL_QUESTIONS) {
      selected = selected.slice(0, TOTAL_QUESTIONS);
    }

    selected.sort((a, b) => b.hard - a.hard);

    return selected;
  }

  // ===== РЕНДЕР НА ВЪПРОС =====

  function renderQuestion(i) {
    const q = questions[i];

    qText.textContent = `${i+1}. ${q.question}`;
    answersDiv.innerHTML = "";
    status.textContent = "";
    nextBtn.disabled = true;
    explanationDiv.style.display = "none";

    updateLivesUI();

    const shuffledAnswers = shuffleArray([...q.answers]);

    shuffledAnswers.forEach(ans => {
      const btn = document.createElement("button");
      btn.textContent = ans;

      btn.onclick = () => {
        lockAnswers();
        clearInterval(timer);

        const correct = normalize(q.correct);
        const chosen = normalize(ans);

        let isCorrect = chosen === correct;

        if (isCorrect) {
          btn.classList.add("correct");
          status.textContent = "✅ Верен отговор!";
        } else {
          btn.classList.add("wrong");
          status.textContent = `❌ Грешно! Верният отговор е: ${q.correct}`;

          Array.from(answersDiv.children).forEach(b => {
            if (normalize(b.textContent) === correct) b.classList.add("correct");
          });

          lives--;
          updateLivesUI();

          if (lives <= 0) {
            gameHistory.push({
              question: q.question,
              yourAnswer: ans,
              correctAnswer: q.correct,
              correct: false,
              explanation: q.explanation
            });
            finishGame("lives");
            return;
          }
        }

        gameHistory.push({
          question: q.question,
          yourAnswer: ans,
          correctAnswer: q.correct,
          correct: isCorrect,
          explanation: q.explanation
        });

        explanationText.innerHTML = q.explanation;
        explanationDiv.style.display = "block";

        nextBtn.disabled = false;

        localStorage.setItem("quiz_survivor_progress", JSON.stringify({
          playerId,
          name: playerName,
          idx: i,
          lives,
          total: questions.length
        }));
      };

      answersDiv.appendChild(btn);
    });

    startTimer();
  }

  // ===== СТАРТ И ПРОДЪЛЖАВАНЕ =====

  const saved = JSON.parse(localStorage.getItem('quiz_survivor_progress'));
  if (saved && saved.idx < saved.total && saved.playerId) {
    continueBtn.style.display = "inline-block";
    continueBtn.textContent = `Продължи от въпрос ${saved.idx + 1}`;
  }

  continueBtn.onclick = () => {
    if (!saved) return;
    playerId = saved.playerId;
    playerName = saved.name || PLAYERS[playerId] || playerId;

    if (alreadyPlayedToday) {
      alreadyPlayedMsg.textContent = "Днес вече си играл.";
      return;
    }

    questions = buildQuestionsForGame();

    idx = saved.idx;
    lives = saved.lives;

    startScreen.style.display = "none";
    quizDiv.style.display = "block";
    renderQuestion(idx);
  };

  startBtn.onclick = async () => {
    const music = document.getElementById("bg-music");
    music.volume = 0.25;
    music.play().catch(()=>{});

    const id = playerIdInput.value.trim();
    if (!id) {
      alert("Въведете ID!");
      return;
    }

    if (!PLAYERS[id]) {
      alert("Невалидно ID!");
      return;
    }

    await checkAlreadyPlayedToday(id);
    if (alreadyPlayedToday) return;

    playerId = id;
    playerName = PLAYERS[id];

    localStorage.removeItem("quiz_survivor_progress");

    questions = buildQuestionsForGame();
    idx = 0;
    lives = 3;
    gameHistory = [];

    startScreen.style.display = "none";
    quizDiv.style.display = "block";

    renderQuestion(0);
  };

  // ===== НАВИГАЦИЯ МЕЖДУ ВЪПРОСИТЕ =====

  nextBtn.onclick = nextQuestionFromExplanation;
  document.getElementById("next-question-btn").onclick = nextQuestionFromExplanation;

  function nextQuestionFromExplanation() {
    explanationDiv.style.display = "none";

    idx++;

    if (idx >= questions.length) {
      finishGame("completed");
      return;
    }

    renderQuestion(idx);
  }

  // ===== КРАЙ НА ИГРАТА =====

  function finishGame(reason) {
    clearInterval(timer);

    const maxQuestionReached = idx + 1;

    submitResultToFirebase({
      playerId,
      playerName,
      maxQuestionReached
    });

    qText.innerHTML =
      `🏁 Край на играта, <b>${playerName}</b>!<br><br>
       Стигна до <b>${maxQuestionReached}</b> въпрос.<br><br>`;

    answersDiv.innerHTML = "";
    nextBtn.disabled = true;
    timerDisplay.textContent = "";
    currentScoreDiv.style.display = "none";

    localStorage.setItem("quiz_survivor_lastResult", JSON.stringify({
      playerId,
      name: playerName,
      maxQuestionReached,
      date: new Date().toLocaleString('bg-BG')
    }));

    localStorage.removeItem("quiz_survivor_progress");

    qText.innerHTML += `
      <div style="display:flex; justify-content:center; gap:12px; margin-top:20px;">
        <button id="history-btn" class="yellow-btn">История на играта</button>
        <button id="retry-btn" class="yellow-btn">Опитай пак</button>
      </div>
    `;

    document.getElementById("history-btn").onclick = showHistoryScreen;
    document.getElementById("retry-btn").onclick = onRetryClicked;

    loadFinalRanking(playerId);
  }

  document.getElementById("close-explanation-btn").onclick = () => {
    explanationDiv.style.display = "none";
  };

})();
</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { 
  getFirestore, doc, setDoc, getDoc,
  collection, query, orderBy, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6ds9mU-xvF1LSvhaeCNtMbROu0k",
  authDomain: "cifromania-ac182.firebaseapp.com",
  projectId: "cifromania-ac182",
  storageBucket: "cifromania-ac182.appspot.com",
  messagingSenderId: "165208255580",
  appId: "1:165208255580:web:b36744f0eb527b6571129"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

/* ============================================================
   ПРОВЕРКА ДАЛИ ИГРАЧЪТ Е ИГРАЛ ДНЕС
============================================================ */
async function checkAlreadyPlayedToday(playerId) {
  const ref = doc(db, "games", "survivor", "results", todayKey(), "players", playerId);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    window.alreadyPlayedToday = true;
    document.getElementById("already-played-msg").textContent = "Днес вече сте играли.";
    document.getElementById("start-btn").disabled = true;
    document.getElementById("continue-btn").style.display = "none";
    return true;
  }

  window.alreadyPlayedToday = false;
  return false;
}

/* ============================================================
   ДНЕВНА КЛАСАЦИЯ
============================================================ */
function loadRanking() {
  const col = collection(db, "games", "survivor", "results", todayKey(), "players");
  const q = query(col, orderBy("maxQuestionReached", "desc"));

  onSnapshot(q, (snap) => {
    let html = `<h2>Куиз Сървайвър – Дневна класация – ${todayKey()}</h2><ol>`;

    snap.forEach(doc => {
      const d = doc.data();
      html += `<li><b>${d.playerName}</b> — ${d.maxQuestionReached} въпросa</li>`;
    });

    html += "</ol>";
    document.getElementById("ranking").innerHTML = html;
  });
}

/* ============================================================
   КРАЙНО КЛАСИРАНЕ
============================================================ */
function loadFinalRanking(playerId) {
  const col = collection(db, "games", "survivor", "results", todayKey(), "players");
  const q = query(col, orderBy("maxQuestionReached", "desc"));

  onSnapshot(q, (snap) => {
    let html = `<h2>Крайно класиране – ${todayKey()}</h2><ol>`;

    snap.forEach(doc => {
      const d = doc.data();
      const highlight = d.playerId === playerId ? "highlight-player" : "";
      html += `<li class="${highlight}"><b>${d.playerName}</b> — ${d.maxQuestionReached} въпросa</li>`;
    });

    html += "</ol>";

    const box = document.getElementById("final-leaderboard");
    box.innerHTML = html;
    box.style.display = "block";
  });
}

/* ============================================================
   ЗАПИС НА РЕЗУЛТАТА + АВТОМАТИЧЕН АРХИВ
============================================================ */
async function submitResultToFirebase({ playerId, playerName, maxQuestionReached }) {

  // 1) Запис в results
  const resultRef = doc(db, "games", "survivor", "results", todayKey(), "players", playerId);
  await setDoc(resultRef, {
    playerId,
    playerName,
    maxQuestionReached,
    timestamp: Date.now()
  });

  // 2) Създаваме документа за деня в архива
  const archiveDayRef = doc(db, "games", "survivor", "archive", todayKey());
  await setDoc(archiveDayRef, { created: Date.now() }, { merge: true });

  // 3) Записваме играча в архива за деня
  const archivePlayerRef = doc(db, "games", "survivor", "archive", todayKey(), "players", playerId);
  await setDoc(archivePlayerRef, {
    playerId,
    playerName,
    maxQuestionReached,
    timestamp: Date.now()
  });
}

/* ============================================================
   ЕКСПОРТ
============================================================ */
window.submitResultToFirebase = submitResultToFirebase;
window.checkAlreadyPlayedToday = checkAlreadyPlayedToday;
